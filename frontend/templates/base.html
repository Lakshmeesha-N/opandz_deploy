<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opandz AI Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex overflow-hidden">

    <aside class="w-72 bg-slate-900 text-white flex flex-col p-6 shadow-xl">
        <h1 class="text-2xl font-bold mb-8 flex items-center gap-2">
            <span class="text-blue-400">🛡️</span> Opandz AI
        </h1>
        
        <div class="space-y-4">
            <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider">User Account</label>
            <input type="email" id="userEmail" placeholder="Enter Email..." 
                   class="w-full bg-slate-800 border border-slate-700 p-2.5 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
            <button onclick="saveEmail()" class="w-full bg-blue-600 hover:bg-blue-500 p-2 rounded-lg text-sm font-medium transition-colors">
                Save Email
            </button>
        </div>

        <nav class="mt-12 space-y-2">
            <a href="/" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition-colors">📦 Vault</a>
            <a href="/upload" class="flex items-center gap-3 p-3 rounded-lg hover:bg-slate-800 transition-colors">🚀 New Extraction</a>
        </nav>

        <div class="mt-auto pt-6 border-t border-slate-800 text-[10px] text-slate-500">
            &copy; 2026 Opandz AI. All rights reserved.
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-white border-b flex items-center px-8 justify-between">
            <h2 class="font-semibold text-slate-700" id="pageTitle">{% block title %}{% endblock %}</h2>
            <div id="statusIndicator" class="text-xs font-medium px-3 py-1 rounded-full bg-slate-100 text-slate-500">
                System Online
            </div>
        </header>
        
        <section class="flex-1 overflow-y-auto p-8">
            {% block content %}{% endblock %}
        </section>
    </main>

    <script src="/static/js/main.js?v=20260416-vault-rest"></script>
</body>
</html>
